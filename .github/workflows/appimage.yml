name: Trinity Launcher - Build & AppImage

on:
  push:
    branches: [ appimage-rebase, master ]
  pull_request:
    branches: [ appimage-rebase, master ]
  workflow_dispatch:

jobs:
  build:
    name: Compilar binarios
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias y compilar
        run: |
          chmod +x build.sh
          ./build.sh --deps
          ./build.sh --release

      - name: Subir binarios compilados
        uses: actions/upload-artifact@v4
        with:
          name: trinity-binaries
          path: |
            build/app/trinity
            build/app/discord_game_sdk.so

  package:
    name: Generar AppImage
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Descargar binarios de la compilación
        uses: actions/download-artifact@v4
        with:
          name: trinity-binaries
          path: binarios-temp

      - name: Instalar dependencias de empaquetado
        run: |
          sudo apt-get update
          sudo apt-get install -y qt6-base-dev qt6-svg-dev libfuse2 wget file

      - name: Preparar AppDir
        run: |
          mkdir -p APPIMAGE-TRINITY/usr/bin
          mkdir -p APPIMAGE-TRINITY/usr/lib
          
          # Mover binarios compilados al AppDir
          cp binarios-temp/trinity APPIMAGE-TRINITY/usr/bin/
          cp binarios-temp/discord_game_sdk.so APPIMAGE-TRINITY/usr/lib/
          
          # Copiar archivos de recursos (iconos/desktop) desde el repo
          # Ajusta estas rutas según la estructura de tu proyecto
          mkdir -p APPIMAGE-TRINITY/usr/share/applications
          mkdir -p APPIMAGE-TRINITY/usr/share/icons/hicolor/scalable/apps
          cp -v metadata/com.trench.trinity.launcher.desktop APPIMAGE-TRINITY/usr/share/applications/
          cp -v metadata/com.trench.trinity.launcher.svg APPIMAGE-TRINITY/usr/share/icons/hicolor/scalable/apps/

      - name: Descargar herramientas de AppImage
        run: |
          wget https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage

      - name: Ejecutar linuxdeploy
        run: |
          export QMAKE=/usr/lib/qt6/bin/qmake
          
          ARCH=x86_64 ./linuxdeploy-x86_64.AppImage \
            --appdir APPIMAGE-TRINITY \
            --plugin qt \
            --output appimage

      - name: Subir AppImage final
        uses: actions/upload-artifact@v4
        with:
          name: Trinity-Launcher-Portable
          path: "*.AppImage"
